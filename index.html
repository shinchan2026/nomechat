<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反射神経ゲーム</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#111;
  color:white;
  text-align:center;
}
h1{ margin-top:30px; }
#score,#time{
  font-size:28px;
  margin:10px;
}
#gameArea{
  position:relative;
  height:60vh;
  margin:20px;
  background:#222;
  border-radius:20px;
  overflow:hidden;
}
#target{
  position:absolute;
  width:80px;
  height:80px;
  border-radius:50%;
  background:#00c853;
  display:none;
  font-size:20px;
  color:white;
  border:none;
}
#startBtn{
  font-size:24px;
  padding:15px 30px;
  border:none;
  border-radius:12px;
  background:#007AFF;
  color:white;
}
</style>
</head>
<body>

<h1>反射神経ゲーム</h1>
<div id="score">点数: 0</div>
<div id="time">残り: 30秒</div>

<div id="gameArea">
  <button id="target">押せ!</button>
</div>

<button id="startBtn">スタート</button>

<script>
let score = 0;
let time = 30;
let playing = false;
let timer;

const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const target = document.getElementById("target");
const gameArea = document.getElementById("gameArea");
const startBtn = document.getElementById("startBtn");

function moveTarget(){
  const areaW = gameArea.clientWidth - 80;
  const areaH = gameArea.clientHeight - 80;
  target.style.left = Math.random() * areaW + "px";
  target.style.top = Math.random() * areaH + "px";
  target.style.display = "block";
}

function startGame(){
  score = 0;
  time = 30;
  playing = true;
  scoreEl.textContent = "点数: " + score;
  timeEl.textContent = "残り: " + time + "秒";
  startBtn.style.display = "none";
  moveTarget();

  timer = setInterval(function(){
    time--;
    timeEl.textContent = "残り: " + time + "秒";

    if(time <= 0){
      endGame();
    }
  },1000);
}

function endGame(){
  playing = false;
  clearInterval(timer);
  target.style.display = "none";
  startBtn.style.display = "inline-block";
  startBtn.textContent = "もう一度";
  alert("終了！ 点数は " + score + " 点です");
}

target.onclick = function(){
  if(!playing) return;
  score++;
  scoreEl.textContent = "点数: " + score;
  moveTarget();
};

startBtn.onclick = startGame;
</script>

</body>
</html>
